<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --border-focus: #7c6af7;
      --accent: #7c6af7;
      --accent-hover: #6a59e0;
      --text: #e2e4ef;
      --muted: #6b7094;
      --red: #f25f5c;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { display: block; }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .logo-text span { color: var(--accent); }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--border-focus); }
    input::placeholder { color: var(--muted); }

    .error {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(242, 95, 92, 0.1);
      border: 1px solid rgba(242, 95, 92, 0.3);
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .error.visible { display: flex; }

    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      margin-top: 8px;
      transition: background 0.15s, opacity 0.15s;
    }

    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 14 L6 9 L9 12 L13 6 L16 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">Discogs <span>Analytics</span></div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your API dashboard.</p>

    <div class="error" id="error">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 4v3.5M7 9.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span id="error-msg">Invalid username or password.</span>
    </div>

    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter your username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button type="submit" id="submit-btn">
        <span id="btn-label">Sign in</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');
    const btnLabel = document.getElementById('btn-label');
    const spinner = document.getElementById('spinner');

    function setLoading(on) {
      submitBtn.disabled = on;
      btnLabel.style.display = on ? 'none' : 'block';
      spinner.style.display = on ? 'block' : 'none';
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      errorEl.classList.add('visible');
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      setLoading(true);

      try {
        const res = await fetch('/analytics/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/analytics/';
        } else {
          showError('Invalid username or password.');
          setLoading(false);
        }
      } catch {
        showError('Could not reach the server. Try again.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
